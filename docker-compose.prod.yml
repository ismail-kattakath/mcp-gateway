# mcp-gateway — production compose.
#
# Recommended companion: Caddyfile.prod in front of this for HTTPS + Bearer auth.
# Defaults: Tier 1 (no docker socket). Uncomment docker-proxy for Tier 2.

services:
  gateway:
    image: ghcr.io/ismail-kattakath/mcp-gateway:latest
    container_name: mcp-gateway-prod
    ports:
      # Loopback-only — Caddy/nginx talks to this from the same host.
      - "127.0.0.1:3000:3000"
    volumes:
      - mcp-repos:/root/.mcp/repos
      - mcp-cache:/root/.mcp/cache
      - mcp-logs:/root/.mcp/logs

      # Registry + secrets from the host filesystem (not baked into the image).
      - ./registry.json:/app/registry.json:ro
      - ./.env:/app/.env:ro
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      # Tier 2 opt-in (see docker-proxy below):
      # DOCKER_HOST: tcp://docker-proxy:2375
    env_file: .env
    restart: always
    networks: [mcp-network]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===== Optional: Tier 2 — filtered Docker socket =====
  #
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy:0.1
  #   container_name: mcp-gateway-docker-proxy
  #   environment:
  #     CONTAINERS: 1
  #     IMAGES: 1
  #     BUILD: 1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: always
  #   networks: [mcp-network]

volumes:
  mcp-repos:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.mcp/repos
  mcp-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.mcp/cache
  mcp-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.mcp/logs

networks:
  mcp-network:
    driver: bridge

# Production checklist:
#
# 1. Front this with Caddyfile.prod (HTTPS + Bearer gate).
# 2. Set GATEWAY_API_KEY in .env (openssl rand -hex 32) and reference it from
#    gateway.security.apiKey in registry.json; set enableAuth: true.
# 3. Decide on Tier 1 (no docker source) vs Tier 2 (proxy) vs Tier 3 (rootless
#    Docker on the host). See CLAUDE.md "Run via Docker" for the trade-offs.
# 4. Backups: tar the named volumes (mcp-repos, mcp-cache, mcp-logs) on a
#    schedule. .env should be backed up out-of-band.
# 5. Updates: docker-compose -f docker-compose.prod.yml pull && up -d
