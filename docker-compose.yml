# mcp-gateway — local dev / quick-start compose.
#
# Default (Tier 1): no Docker socket access. `pkg` / `git` / `remote` / `local`
# servers work out of the box. `container` source is disabled until you opt in
# (see the docker-proxy block at the bottom).
#
# Pre-built image:   image: ghcr.io/ismail-kattakath/mcp-gateway:latest
# Local build:       comment image: and uncomment build:

services:
  gateway:
    image: ghcr.io/ismail-kattakath/mcp-gateway:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: mcp-gateway
    ports:
      # Loopback-only; put Caddy in front for HTTPS / remote access.
      - "127.0.0.1:3000:3000"
    volumes:
      # Registry + secrets bind-mounted so changes don't require rebuild.
      - ./registry.json:/app/registry.json:ro
      - ./.env:/app/.env:ro

      # Persistent state (clones, build cache, logs) on the host.
      - ${HOME}/.mcp/repos:/root/.mcp/repos
      - ${HOME}/.mcp/cache:/root/.mcp/cache
      - ${HOME}/.mcp/logs:/root/.mcp/logs
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      # Uncomment if you've enabled the docker-proxy service below to use `source: "container"`.
      # DOCKER_HOST: tcp://docker-proxy:2375
    env_file: .env
    restart: unless-stopped
    networks: [mcp-network]

  # ===== Optional: Tier 2 — `source: "container"` via a filtered Docker socket =====
  #
  # Uncomment this service AND the DOCKER_HOST env var above to allow gateway-
  # spawned containers without giving the gateway full host root. The proxy
  # whitelists just the Docker APIs the container source needs (build, pull,
  # create/start/stop, inspect) and rejects everything else (volume mounts of
  # arbitrary host paths, --privileged, network manipulation, etc.).
  #
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy:0.1
  #   container_name: mcp-gateway-docker-proxy
  #   environment:
  #     CONTAINERS: 1      # list / create / start / stop
  #     IMAGES: 1          # pull / inspect
  #     BUILD: 1           # docker build (for source: container with build:)
  #     # Everything else (NETWORKS, VOLUMES, EXEC, SWARM, POST=1 on dangerous endpoints) stays 0.
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: unless-stopped
  #   networks: [mcp-network]

networks:
  mcp-network:
    driver: bridge
