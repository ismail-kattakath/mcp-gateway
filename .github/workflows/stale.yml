name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.

            If this is still relevant, please comment to keep it open.
          close-issue-message: |
            This issue was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if this is still relevant.
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,enhancement,good first issue'

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.

            Please update this PR if you'd like to continue working on it.
          close-pr-message: |
            This pull request was closed because it has been stale for 7 days with no activity.
            Feel free to reopen if you'd like to continue working on this.
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress'

          # Operations
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
