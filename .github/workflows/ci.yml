name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint & Format Check
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Lint server
        run: cd server && npm run lint

      - name: Lint UI
        run: cd ui && npm run lint

      - name: Check server formatting
        run: cd server && npm run format:check

      - name: Check UI formatting
        run: cd ui && npm run format:check

  # Job 2: Type Check
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Type check server
        run: cd server && npm run type-check

      - name: Type check UI
        run: cd ui && npm run type-check

  # Job 3: Test Server (Matrix)
  test-server:
    name: Test Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run tests with coverage
        run: cd server && npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ismail-kattakath/mcp-gateway
          flags: server
          files: ./server/coverage/lcov.info
          fail_ci_if_error: true

  # Job 4: Test UI (Matrix)
  test-ui:
    name: Test UI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Run tests with coverage
        run: cd ui && npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ismail-kattakath/mcp-gateway
          flags: ui
          files: ./ui/coverage/lcov.info
          fail_ci_if_error: false  # UI tests may be minimal

  # Job 5: Build Server
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Build
        run: cd server && npm run build

      - name: Check build output exists
        run: |
          if [ ! -d "server/dist" ]; then
            echo "Build failed - dist directory not created"
            exit 1
          fi
          echo "Build successful - $(find server/dist -name '*.js' | wc -l) JS files generated"

  # Job 6: Build UI
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build
        run: cd ui && npm run build

      - name: Check build output exists
        run: |
          if [ ! -d "ui/dist" ]; then
            echo "Build failed - dist directory not created"
            exit 1
          fi
          echo "Build successful - $(du -sh ui/dist | cut -f1) bundle size"

  # Job 7: Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit server dependencies
        run: |
          cd server
          npm audit --audit-level=high || true
          echo "Server audit completed"

      - name: Audit UI dependencies
        run: |
          cd ui
          npm audit --audit-level=high || true
          echo "UI audit completed"

      - name: Create audit summary
        run: |
          echo "### Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`npm audit fix\` locally to address vulnerabilities" >> $GITHUB_STEP_SUMMARY

  # Job 8: Dependency Review (PRs only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # Job 9: All Checks Passed
  all-checks:
    name: All CI Checks
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-server, test-ui, build-server, build-ui, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test-server.result }}" != "success" ]] || \
             [[ "${{ needs.test-ui.result }}" != "success" ]] || \
             [[ "${{ needs.build-server.result }}" != "success" ]] || \
             [[ "${{ needs.build-ui.result }}" != "success" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
