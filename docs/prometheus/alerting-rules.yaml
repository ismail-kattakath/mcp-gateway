# Prometheus Alerting Rules for MCP Gateway
#
# Usage:
# 1. Save this file to your Prometheus config directory
# 2. Add to prometheus.yml:
#    rule_files:
#      - "alerting-rules.yaml"
# 3. Reload Prometheus: curl -X POST http://localhost:9090/-/reload

groups:
  - name: mcp_gateway_alerts
    interval: 30s
    rules:
      # ===== HTTP Error Rate Alerts =====

      - alert: HighErrorRate
        expr: |
          sum(rate(mcp_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(mcp_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          component: http
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: ModerateErrorRate
        expr: |
          sum(rate(mcp_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(mcp_http_requests_total[5m]))
          > 0.01
        for: 10m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "Moderate HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

      # ===== Latency Alerts =====

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(mcp_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High p95 latency detected"
          description: "p95 latency is {{ $value }}s (threshold: 1s)"

      - alert: VeryHighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(mcp_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 2m
        labels:
          severity: critical
          component: http
        annotations:
          summary: "Very high p95 latency detected"
          description: "p95 latency is {{ $value }}s (threshold: 5s)"

      # ===== MCP Server Alerts =====

      - alert: MCPServerDown
        expr: mcp_server_status{lifecycle="persistent"} == 0
        for: 2m
        labels:
          severity: critical
          component: mcp
        annotations:
          summary: "MCP server {{$labels.server}} is down"
          description: "Persistent server {{$labels.server}} has been stopped for 2 minutes"

      - alert: MCPServerFailed
        expr: mcp_server_status == 2
        for: 1m
        labels:
          severity: critical
          component: mcp
        annotations:
          summary: "MCP server {{$labels.server}} has failed"
          description: "Server {{$labels.server}} is in failed state"

      - alert: HighServerRestartRate
        expr: |
          rate(mcp_server_restarts_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: mcp
        annotations:
          summary: "High restart rate for server {{$labels.server}}"
          description: "Server {{$labels.server}} is restarting frequently ({{ $value }} restarts/min)"

      # ===== Tool Call Alerts =====

      - alert: HighToolCallErrorRate
        expr: |
          sum(rate(mcp_tool_calls_total{status="error"}[5m])) by (server)
          /
          sum(rate(mcp_tool_calls_total[5m])) by (server)
          > 0.1
        for: 5m
        labels:
          severity: warning
          component: mcp
        annotations:
          summary: "High tool call error rate on server {{$labels.server}}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: ToolCallTimeout
        expr: |
          histogram_quantile(0.95,
            sum(rate(mcp_tool_call_duration_seconds_bucket[5m])) by (server, le)
          ) > 30
        for: 5m
        labels:
          severity: warning
          component: mcp
        annotations:
          summary: "Tool calls timing out on server {{$labels.server}}"
          description: "p95 tool call duration is {{ $value }}s (threshold: 30s)"

      # ===== Resource Alerts =====

      - alert: HighMemoryUsage
        expr: |
          mcp_gateway_nodejs_heap_size_used_bytes
          /
          mcp_gateway_nodejs_heap_size_total_bytes
          > 0.9
        for: 5m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High memory usage detected"
          description: "Heap usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      - alert: CriticalMemoryUsage
        expr: |
          mcp_gateway_nodejs_heap_size_used_bytes
          /
          mcp_gateway_nodejs_heap_size_total_bytes
          > 0.95
        for: 2m
        labels:
          severity: critical
          component: resources
        annotations:
          summary: "Critical memory usage detected"
          description: "Heap usage is {{ $value | humanizePercentage }} (threshold: 95%)"

      - alert: HighEventLoopLag
        expr: |
          rate(mcp_gateway_nodejs_eventloop_lag_seconds[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High event loop lag detected"
          description: "Event loop lag is {{ $value }}s (threshold: 0.1s)"

      # ===== Connection Alerts =====

      - alert: NoActiveConnections
        expr: mcp_active_connections == 0
        for: 10m
        labels:
          severity: warning
          component: connections
        annotations:
          summary: "No active SSE connections"
          description: "Gateway has had no active connections for 10 minutes"

      - alert: TooManyActiveConnections
        expr: mcp_active_connections > 100
        for: 5m
        labels:
          severity: warning
          component: connections
        annotations:
          summary: "Too many active connections"
          description: "Gateway has {{ $value }} active connections (threshold: 100)"

      # ===== Registry Alerts =====

      - alert: NoEnabledServers
        expr: mcp_registry_servers_count{enabled="true"} == 0
        for: 5m
        labels:
          severity: critical
          component: registry
        annotations:
          summary: "No enabled servers in registry"
          description: "Registry has no enabled servers configured"

      - alert: FrequentRegistryReloads
        expr: |
          rate(mcp_registry_reload_total[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
          component: registry
        annotations:
          summary: "Frequent registry reloads detected"
          description: "Registry is reloading {{ $value }} times per minute"
