# IMPORTANT: This is an EXAMPLE secret file for demonstration purposes.
# In production, use one of the following approaches:
#   1. Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   2. External Secrets Operator (https://external-secrets.io/)
#   3. HashiCorp Vault integration
#   4. Cloud provider secret managers (AWS Secrets Manager, Azure Key Vault, GCP Secret Manager)
#
# Never commit actual secrets to version control!

apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secrets
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # API key for gateway authentication (replace with actual value)
  API_KEY: "CHANGEME-USE-STRONG-RANDOM-KEY"
  # Database encryption key (32 bytes base64-encoded)
  DATABASE_ENCRYPTION_KEY: "CHANGEME-USE-STRONG-ENCRYPTION-KEY"
  # Optional: JWT secret for OAuth/SAML
  JWT_SECRET: "CHANGEME-USE-STRONG-JWT-SECRET"
  # Optional: OAuth client credentials
  OAUTH_CLIENT_ID: ""
  OAUTH_CLIENT_SECRET: ""
  # Optional: SAML certificate and key
  SAML_CERT: ""
  SAML_PRIVATE_KEY: ""
