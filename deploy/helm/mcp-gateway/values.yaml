# Default values for mcp-gateway Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas for the gateway deployment
replicaCount: 3

image:
  repository: ghcr.io/ismail-kattakath/mcp-gateway
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  annotations: {}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mcp-gateway-tls
      hosts:
        - gateway.example.com

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Persistent storage for SQLite database
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Gi
  # storageClass: ""  # Use default storage class if not specified
  annotations: {}

# Database configuration
database:
  type: sqlite  # Options: sqlite, postgresql
  path: /data/gateway.db
  encryption:
    enabled: true
    # Key should be provided via secret

# Application configuration
config:
  nodeEnv: production
  logLevel: info
  gatewayHost: "0.0.0.0"
  gatewayPort: 3000
  # Rate limiting
  rateLimit:
    enabled: true
    windowMs: 60000
    maxRequests: 1000
  # Tracing
  tracing:
    enabled: false
    jaegerEndpoint: ""

# Secrets configuration
# IMPORTANT: In production, use External Secrets Operator or similar
secrets:
  apiKey: "CHANGEME-USE-STRONG-RANDOM-KEY"
  databaseEncryptionKey: "CHANGEME-USE-STRONG-ENCRYPTION-KEY"
  jwtSecret: "CHANGEME-USE-STRONG-JWT-SECRET"
  # OAuth credentials (optional)
  oauth:
    clientId: ""
    clientSecret: ""
  # SAML credentials (optional)
  saml:
    cert: ""
    privateKey: ""

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true

# Network policy
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# Pod affinity/anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcp-gateway
          topologyKey: kubernetes.io/hostname

nodeSelector: {}

tolerations: []
