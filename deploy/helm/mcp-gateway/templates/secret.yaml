apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.secrets.apiKey | quote }}
  DATABASE_ENCRYPTION_KEY: {{ .Values.secrets.databaseEncryptionKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.secrets.oauth.clientId }}
  OAUTH_CLIENT_ID: {{ .Values.secrets.oauth.clientId | quote }}
  {{- end }}
  {{- if .Values.secrets.oauth.clientSecret }}
  OAUTH_CLIENT_SECRET: {{ .Values.secrets.oauth.clientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.saml.cert }}
  SAML_CERT: {{ .Values.secrets.saml.cert | quote }}
  {{- end }}
  {{- if .Values.secrets.saml.privateKey }}
  SAML_PRIVATE_KEY: {{ .Values.secrets.saml.privateKey | quote }}
  {{- end }}
